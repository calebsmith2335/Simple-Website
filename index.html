<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For You ❤️</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffd6e7, #ffeef5, #fff7fb);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .card {
      position: relative;
      z-index: 5;
      width: min(90%, 700px);
      background: rgba(255, 255, 255, 0.78);
      border-radius: 28px;
      padding: 40px 28px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(8px);
    }

    .small-text {
      color: #b04a6f;
      font-size: 0.95rem;
      letter-spacing: 1px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 12px;
      color: #d63384;
      font-size: clamp(2.2rem, 6vw, 4.2rem);
      line-height: 1.1;
    }

    p {
      color: #6b3b52;
      font-size: 1.05rem;
      line-height: 1.7;
      margin: 0 auto;
      max-width: 540px;
    }

    .button-row {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
    }

    .primary-btn {
      background: #ff4f93;
      color: white;
    }

    .secondary-btn {
      background: white;
      color: #d63384;
    }

    #messageBox {
      margin-top: 28px;
      padding: 22px 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.88);
      color: #7a3658;
      font-size: 1.15rem;
      line-height: 1.8;
      min-height: 110px;
      display: none;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      animation: blink 0.8s infinite;
      color: #d63384;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      50.01%, 100% { opacity: 0; }
    }

    .floating-photo {
  position: absolute;
  bottom: -180px;
  width: 110px;
  background: white;
  padding: 8px 8px 18px 8px;
  border-radius: 6px;
  opacity: 0.88;
  pointer-events: none;
  z-index: 1;
  box-shadow: 0 10px 28px rgba(0, 0, 0, 0.22);
  animation: floatPhoto linear forwards;
}

   .floating-photo img {
  display: block;
  width: 100%;
  height: 95px;
  object-fit: cover;
  border-radius: 4px;
}

@keyframes floatPhoto {
  0% {
    transform: translateY(0) rotate(-6deg) scale(1);
    opacity: 0;
  }
  10% {
    opacity: 0.88;
  }
  50% {
    transform: translateY(-55vh) rotate(4deg) scale(1.03);
    opacity: 0.88;
  }
  100% {
    transform: translateY(-120vh) rotate(-3deg) scale(1.06);
    opacity: 0;
  }
}

@media (max-width: 600px) {
  .floating-photo {
    width: 85px;
    padding: 6px 6px 14px 6px;
  }

  .floating-photo img {
    height: 74px;
  }
}
  </style>
</head>
<body>
  <div class="card">
    <div class="small-text">A little something for you</div>
    <h1>I love you ❤️</h1>
    <p>
      I made this just to remind you how special you are to me.
    </p>

    <div class="button-row">
      <button class="primary-btn" onclick="revealMessage()">Open My Note</button>
      <button class="secondary-btn" onclick="showReason()">One More Reason</button>
    </div>

    <div id="messageBox"></div>

    <div class="footer">Made with love.</div>
  </div>

  <script>
    const fullMessage =
      "You mean so much to me. Thank you for your smile, your heart, and the way you make life feel brighter. No matter what, I just want you to know this: I love you so, so much. ❤️";

    const reasons = [
      "You make ordinary days feel special.",
      "Your smile makes everything better.",
      "You bring peace, joy, and warmth with you.",
      "You are thoughtful in ways that mean a lot to me.",
      "Life feels brighter with you in it.",
      "You are deeply loved, always. ❤️"
    ];

    // Put your image paths here
    const floatingImages = [
      "Pictures/IMG_0541.JPG",
      "Pictures/IMG_0554.JPG",
      "Pictures/IMG_5854.jpeg",
      "Pictures/IMG_7751.JPG",
      "Pictures/IMG_9765.jpeg",
      "Pictures/lp_image.jpeg"
    ];

    let typedAlready = false;
    let reasonIndex = 0;

    function revealMessage() {
      const box = document.getElementById("messageBox");
      box.style.display = "block";

      if (typedAlready) {
        box.innerHTML = fullMessage;
        return;
      }

      typedAlready = true;
      typeMessage(fullMessage, box, 0);
    }

    function typeMessage(text, element, index) {
      if (index < text.length) {
        element.innerHTML = text.substring(0, index + 1) + '<span class="cursor">|</span>';
        setTimeout(() => typeMessage(text, element, index + 1), 35);
      } else {
        element.innerHTML = text;
      }
    }

    function showReason() {
      const box = document.getElementById("messageBox");
      box.style.display = "block";
      box.innerHTML = reasons[reasonIndex];
      reasonIndex = (reasonIndex + 1) % reasons.length;
    }

    function createFloatingPhoto() {
      const photo = document.createElement("img");
      photo.className = "floating-photo";
      photo.src = floatingImages[Math.floor(Math.random() * floatingImages.length)];
      photo.style.left = Math.random() * 100 + "vw";
      photo.style.animationDuration = (8 + Math.random() * 6) + "s";
      photo.style.width = (70 + Math.random() * 45) + "px";
      photo.style.height = photo.style.width;
      photo.style.transform = `rotate(${Math.random() * 20 - 10}deg)`;

      document.body.appendChild(photo);

      setTimeout(() => {
        photo.remove();
      }, 15000);
    }

    setInterval(createFloatingPhoto, 1800);
  </script>
</body>
</html>
